<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-7SV03ZXJ9R">
        </script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', 'G-7SV03ZXJ9R');
        </script>
        <title>
            Infinite Campus
        </title>
        <link id="dynamic-favicon" rel="icon" type="image/png" href="/res/icon.png">
        <link rel="stylesheet" href="global.css">
        <meta name="keywords" content="Infinite campus,infinite campus,Infinite Campus,infinite Campus">
        <meta name="description" content="Infinite Campus Is A International Buisiness And Has Good Devs">
        <meta property="og:title" content="Infinite Campus">
        <meta property="og:description" content="Infinite Campus Is An International Buisiness And Has Good Devs">
        <meta property="og:url" content="https://www.infinitecampus.xyz">
        <meta name="theme-color" content="#8cbe37">
        <link rel="manifest" href="/manifest.json">
        <meta content="/res/icon.png" property="og:image">
        <script src="main.js">
        </script>
        <script src="theme.js">
        </script>
        <style>
            body {
                background: #111;
                color: black;
                overflow: hidden;
            }
            #main {
                display: flex;
                height: calc(100vh - (var(--headerHeight) + var(--footerHeight)));
                overflow: hidden;
            }
            #messages {
                min-width: 0;
                flex: 1;
                display: flex;
                flex-direction: column;
                height: 100%;
            }
            button:not(#mobileMenuBtn):not(#closeMobilePanel):not(.dropdown-toggle):not(.dropdown.test button):not(#weatherContainer div button) {
                background: #333;
                border: 1px solid #555;
                color: #eee;
                padding: 10px 14px;
                border-radius: 8px;
                font-weight: 600;
                cursor: pointer;
                transition: 0.2s ease;
            }
            button:not(#mobileMenuBtn):not(#closeMobilePanel):not(.dropdown-toggle):not(.dropdown.test button):not(#weatherContainer div button):hover {
                background: #444;
                border-color: #777;
            }
            button:not(#mobileMenuBtn):not(#closeMobilePanel):not(.dropdown-toggle):not(.dropdown.test button):not(#weatherContainer div button):active {
                background: #222;
            }
            ::-webkit-scrollbar {
                width: 15px;
                height: 20px;
            }
            ::-webkit-scrollbar-track { 
                background: transparent;
            }
            ::-webkit-scrollbar-thumb {
                background-color: grey;
                border-radius: 10px;
            }
            ::-webkit-scrollbar-thumb:hover { 
                background-color: #888; 
            }
            ::-webkit-scrollbar-button { 
                display: none; 
            }
            .timestamp {
                align-self:flex-start;
            }
        </style>
    </head>
    <body>
        <main>
            <button id="mobileToggle" class="btn btn-secondary btn-sm">
                <i class="bi bi-list"></i>
            </button>
            <div id="main" style="color:white">
                <div id="sidebar">
                    <div id="profileSection">
                        <div id="profileRow" onclick="window.location.href='InfiniteAccounts.html?chat=true'">
                            <img id="sidebarPfp">
                            <div id="profileInfo" style="display: flex; flex-direction: column;">
                                <span id="username" style="font-weight:bold;">
                                </span>
                                <span id="role" style="margin-top:2px;">
                                </span>
                                <span id="bio" style="margin-top:2px;">
                                </span>
                                <label id="mentionToggleLabel" style="cursor:pointer; color:#ccc; font-weight:bold; font-size:0.85em; margin-top:6px;">
                                    <input type="checkbox" id="mentionToggle" style="margin-right:5px;">
                                    Show Mentions
                                </label>
                            </div>
                        </div>
                        <div id="mentionsContainer" class="mt-2">
                            <div id="mentionNotif" style="display:none; cursor:pointer; color:yellow; font-weight:bold;">
                                <i class="bi bi-bell-fill"></i> You Were Mentioned!
                            </div>
                            <div id="mentionsList" style="display:none;">
                            </div>
                        </div>
                    </div>
                    <h4 class="text-center mt-3">
                        Channels
                    </h4>
                    <hr>
                    <ul id="channels" class="p-0">
                    </ul>
                    <div id="adminControls" style="display:none;">
                        <input type="text" id="newChannelName" class="form-control" placeholder="New Channel">
                        <button id="addChannelBtn" class="btn btn-primary btn-sm mt-2">
                            Add
                        </button>
                    </div>
                    <h4 class="text-center mt-4">
                        Private
                    </h4>
                    <hr>
                    <ul id="privateList" class="p-0">
                    </ul>
                </div>
                <div id="messages">
                    <div id="chatLog">
                    </div>
                    <div class="p-3">
                        <div id="mentionHint" style="display:none; color:#aaa; font-size:0.9em; margin-bottom:4px;">
                            Press Tab To Mention User
                        </div>
                        <div id="mentionMenu">
                        </div>
                        <div id="reply" style="display:none;">
                        </div>
                        <textarea id="chatInput" placeholder="Type A Message" rows="3"></textarea>
                        <button id="sendBtn">
                            <i class="bi bi-send"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js">
        </script>
        <script type="module" src="chat.js">
        </script>
        <script>
            const sidebar = document.getElementById("sidebar");
            const mobileToggle = document.getElementById("mobileToggle");
            mobileToggle.onclick = () => {
                sidebar.classList.toggle("open");
            };
        </script>
        <script src="frame.js">
        </script>
    </body>
</html>
