<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>
            Infinite Campus Statuses
        </title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>
            body { 
                font-family:system-ui,sans-serif; 
                background:#121212; 
                margin:0; 
                padding:20px; 
            }
            h1 { 
                color:lime; 
            }
            #loginBtn, #addSiteBtn {
                position:fixed;
                top:20px;
                right:20px;
                background:#1ecb4f;
                border:none; 
                padding:10px 15px; 
                border-radius:6px; 
                cursor:pointer; 
                font-weight:bold;
            }
            #schedule, #loginSubmit {
                background:#1ecb4f;
                border:none;
                padding:10px 15px;
                border-radius:6px;
                cursor:pointer;
                font-weight:bold;
            }
            #addSiteBtn { 
                right:150px; 
                display:none; 
            }
            .overlay { 
                position:fixed; 
                top:0; 
                left:0; 
                width:100%; 
                height:100%;
                background:rgba(0,0,0,0.7); 
                display:none; 
                align-items:center; 
                justify-content:center; 
                z-index:100;
            }
            .modal { 
                background:#222; 
                padding:25px; 
                border-radius:10px; 
                width:320px; 
                color:white; 
            }
            .modal input { 
                width:100%; 
                margin-bottom:10px; 
                padding:8px; 
                background:#111; 
                border:1px solid #444; 
                color:white; 
            }
            .modal button { 
                width:100%; 
                padding:8px; 
                background:#1ecb4f; 
                border:none; 
                cursor:pointer; 
            }
            .site { 
                background:#333; 
                color:white; 
                border-radius:10px; 
                padding:15px; 
                margin-bottom:15px;
            }
            .site-header { 
                display:flex; 
                justify-content:space-between; 
                align-items:center; 
            }
            .bars { 
                display:grid; 
                grid-template-columns:repeat(24,1fr); 
                gap:3px; 
                margin-top:10px;
            }
            .bar { 
                height:25px; 
                border-radius:3px; 
            }
            .up { 
                background:#1ecb4f; 
            }
            .down { 
                background:#e53935;
            }
            .maintenance { 
                background:gray;
            }
            .adminBtns { 
                margin-top:10px; 
                display:none; 
                gap:6px;
            }
            .adminBtns button { 
                padding:5px 8px; 
                border:none; 
                cursor:pointer; 
            }
            #sites { 
                max-width:75%; 
                margin-bottom:30px; 
            }
            #upcomingMaint { 
                color:white; 
                margin-bottom:15px; 
            }
        </style>
    </head>
    <body>
        <button id="loginBtn">
            Login
        </button>
        <button id="addSiteBtn">
            Add Site
        </button>
        <center>
            <h1>
                Service Status (Last 24 Hours)
            </h1>
            <p style="color:white">
                To Report An Issue Email support@infinitecampus.xyz
            </p>
            <div id="upcomingMaint">
            </div>
            <div id="sites">
            </div>
        </center>
        <div id="loginOverlay" class="overlay">
            <div class="modal">
                <h3>
                    Login
                </h3>
                <input id="email" placeholder="Email">
                <input id="password" type="password" placeholder="Password">
                <button id="loginSubmit">
                    Login
                </button>
            </div>
        </div>
        <div id="maintOverlay" class="overlay">
            <div class="modal">
                <h3>
                    Schedule Maintenance
                </h3>
                <label>
                    Start
                </label>
                <input type="datetime-local" id="maintStart">
                <label>
                    End
                </label>
                <input type="datetime-local" id="maintEnd">
                <button id="scheduleBtn">
                    Schedule
                </button>
            </div>
        </div>
        <div id="addOverlay" class="overlay">
            <div class="modal">
                <h3>
                    Add New Site
                </h3>
                <label>
                    Site Name
                </label>
                <input id="newSiteName" placeholder="Site Name">
                <label>
                    URL
                </label>
                <input id="newSiteUrl" placeholder="https://example.com">
                <button id="addSubmit">
                    Add Site
                </button>
            </div>
        </div>
        <div id="currentMaintOverlay" class="overlay">
            <div class="modal">
                <h3>
                    Site Undergoing Maintenance
                </h3>
                <p id="maintMessage">
                    This Site Is Currently Undergoing Maintenance.
                </p>
                <p id="maintCountdown">
                </p>
            </div>
        </div>
        <script type="module">
            import { initializeApp } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js";
            import { getDatabase, ref, onValue, set, remove, get } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-database.js";
            import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-auth.js";
            const firebaseConfig = {
                apiKey: "AIzaSyA-_Troqe-OyvWB00JmyKNB7pcn3zIHyHI",
                authDomain: "status-ba6c4.firebaseapp.com",
                databaseURL: "https://status-ba6c4-default-rtdb.firebaseio.com",
                projectId: "status-ba6c4",
                storageBucket: "status-ba6c4.firebasestorage.app",
                messagingSenderId: "441004794689",
                appId: "1:441004794689:web:7616524d59f40274b777c0"
            };
            const app = initializeApp(firebaseConfig);
            const db = getDatabase(app);
            const auth = getAuth(app);
            let loggedIn = false;
            let currentSite = null;
            const container = document.getElementById("sites");
            const upcomingMaintEl = document.getElementById("upcomingMaint");
            document.getElementById("loginBtn").onclick = () => document.getElementById("loginOverlay").style.display = "flex";
            document.getElementById("loginSubmit").onclick = async () => {
                const email = document.getElementById("email").value;
                const password = document.getElementById("password").value;
                try {
                    await signInWithEmailAndPassword(auth, email, password);
                    loggedIn = true;
                    document.querySelectorAll(".adminBtns").forEach(b => b.style.display = "flex");
                    document.getElementById("addSiteBtn").style.display = "block";
                    document.getElementById("loginOverlay").style.display = "none";
                    if (!localStorage.getItem("admin")) {
                        let adminPass = prompt("Set Your Admin Password:");
                        if (!adminPass) return alert("Admin Password Required!");
                        localStorage.setItem("admin", adminPass);
                        alert("Admin Password Set!");
                    }
                    loadSites();
                } catch (err) {
                    alert("Login Failed: " + err.message);
                }
            };
            document.getElementById("addSiteBtn").onclick = () => document.getElementById("addOverlay").style.display = "flex";
            document.getElementById("addSubmit").onclick = async () => {
                const name = document.getElementById("newSiteName").value.trim();
                const url = document.getElementById("newSiteUrl").value.trim();
                if (!name || !url) return alert("Enter Name And URL");
                const sitesSnap = await get(ref(db, "sites"));
                let nextNum = 1;
                if (sitesSnap.exists()) {
                    const nums = Object.keys(sitesSnap.val()).map(n => parseInt(n)).filter(n => !isNaN(n));
                    nextNum = nums.length ? Math.max(...nums) + 1 : 1;
                }
                await set(ref(db, `sites/${nextNum}/name`), name);
                await set(ref(db, `sites/${nextNum}/url`), url);
                await set(ref(db, `sites/${nextNum}/status`), {});
                document.getElementById("addOverlay").style.display = "none";
                loadSites();
            };
            async function loadSites() {
                container.innerHTML = "";
                upcomingMaintEl.innerHTML = "<strong>Upcoming Maintenance:</strong><br>";
                const sitesSnap = await get(ref(db, "sites"));
                if (!sitesSnap.exists()) return;
                const sitesRoot = sitesSnap.val();
                const siteNums = Object.keys(sitesRoot);
                const now = Math.floor(Date.now()/1000);
                for (let num of siteNums) {
                    const siteData = sitesRoot[num];
                    const siteName = siteData.name || `Site ${num}`;
                    const siteUrl = siteData.url || "";
                    const div = document.createElement("div");
                    div.className = "site";
                    div.innerHTML = `
                        <div class="site-header">
                            <h3>
                                ${siteName}
                            </h3>
                            <div id="${num}-percent">
                                —
                            </div>
                        </div>
                        <div class="bars" id="${num}-bars">
                        </div>
                        <div class="adminBtns" id="${num}-admin">
                            <button id="schedule" onclick="schedule('${num}')">
                                Schedule Maintenance
                            </button>
                            <button id="schedule" onclick="deleteSite('${num}')">
                                Delete
                            </button>
                        </div>
                    `;
                    if (loggedIn) {
                        div.querySelector(".adminBtns").style.display = "flex";
                    }
                    container.appendChild(div);
                    const statusRef = ref(db, `sites/${num}/status`);
                    const maintRef = ref(db, `sites/${num}/maint`);
                    onValue(statusRef, snap => updateBars(num, siteName, snap.val() || {}, maintRef));
                }
            }
            async function updateBars(num, siteName, data, maintRef) {
                const bars = document.getElementById(num + "-bars");
                const now = Math.floor(Date.now()/1000);
                onValue(maintRef, async maintSnap => {
                    const maintenance = maintSnap.val() || {};
                    bars.innerHTML = "";
                    let upHours = 0;
                    for (let i = 23; i >= 0; i--) {
                        const start = new Date(Date.now() - i * 3600000);
                        const end = new Date(Date.now() - (i-1) * 3600000);
                        const key = `${start.getUTCFullYear()}-${String(start.getUTCMonth()+1).padStart(2,"0")}-${String(start.getUTCDate()).padStart(2,"0")}-${String(start.getUTCHours()).padStart(2,"0")}`;
                        const entry = data[key];
                        let isUp = entry ? entry.up : false;
                        const bar = document.createElement("div");
                        let isMaintenance = false;
                        if (maintenance.start && maintenance.end) {
                            const ts = Math.floor(start.getTime()/1000);
                            if (ts >= maintenance.start && ts <= maintenance.end) isMaintenance = true;
                        }
                        if (isMaintenance) bar.className="bar maintenance";
                        else if (isUp) { bar.className="bar up"; upHours++; }
                        else bar.className="bar down";
                        const fromTime = start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                        const toTime = end.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                        bar.title = `${isMaintenance ? "Maintenance" : isUp ? "Up" : "Down"}\nFrom: ${fromTime} To: ${toTime}`;
                        bars.appendChild(bar);
                    }
                    document.getElementById(num + "-percent").textContent = Math.round((upHours/24)*100) + "% uptime";
                    if (maintenance.start && maintenance.end && now >= maintenance.start && now <= maintenance.end) {
                        const overlay = document.getElementById("currentMaintOverlay");
                        overlay.style.display = "flex";
                        document.getElementById("maintMessage").textContent = `${siteName} Is Currently Undergoing Maintenance.`;
                        const countdownEl = document.getElementById("maintCountdown");
                        const updateCountdown = () => {
                            const remaining = maintenance.end - Math.floor(Date.now()/1000);
                            if (remaining <= 0) { overlay.style.display="none"; clearInterval(timer); return; }
                            const h = Math.floor(remaining/3600), m = Math.floor((remaining%3600)/60), s = remaining%60;
                            countdownEl.textContent = `Maintenance Ends In About ${h}h ${m}m ${s}s`;
                        };
                        updateCountdown();
                        const timer = setInterval(updateCountdown, 1000);
                    }
                    if (maintenance.start && maintenance.end && maintenance.start > now) {
                        const startStr = new Date(maintenance.start*1000).toLocaleString([], {hour:'2-digit', minute:'2-digit', month:'short', day:'numeric'});
                        const endStr = new Date(maintenance.end*1000).toLocaleString([], {hour:'2-digit', minute:'2-digit', month:'short', day:'numeric'});
                        upcomingMaintEl.innerHTML += `${siteName}: ${startStr} → ${endStr}<br>`;
                    }
                });
            }
            window.loadSites = loadSites;
            window.schedule = (site) => { currentSite = site; document.getElementById("maintOverlay").style.display="flex"; };
            document.getElementById("scheduleBtn").onclick = async () => {
                const start = new Date(document.getElementById("maintStart").value);
                const end = new Date(document.getElementById("maintEnd").value);
                if (!localStorage.getItem("admin")) return alert("Admin Password Not Set!");
                await set(ref(db, `sites/${currentSite}/maint`), {
                    start: Math.floor(start.getTime()/1000),
                    end: Math.floor(end.getTime()/1000)
                });
                const siteDataSnap = await get(ref(db, `sites/${currentSite}`));
                const siteData = siteDataSnap.val();
                const url = siteData.url;
                const adminPass = localStorage.getItem("admin");
                const startTs = Math.floor(start.getTime()/1000);
                const endTs = Math.floor(end.getTime()/1000);
                const message = `Maintenance Scheduled For ${url}\nFrom: <t:${startTs}:F>\nTo: <t:${endTs}:F>`;
                const targetChannelId = "1456025656558092372";
                await fetch("https://api.infinitecampus.xyz/send", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "x-admin-password": adminPass
                    },
                    body: JSON.stringify({ message, channelId: targetChannelId })
                });
                document.getElementById("maintOverlay").style.display = "none";
            };
            window.deleteSite = async (num) => {
                await remove(ref(db, "sites/"+num));
                loadSites();
            };
            window.onload = () => {
                loadSites();
            };
        </script>
    </body>
</html>
